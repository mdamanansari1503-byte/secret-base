<!DOCTYPE html>
<html>
<head>
    <title>Secret Base</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #bf00ff; box-shadow: 0 0 20px #bf00ff55; }
        
        #loginScreen { display: block; }
        #chatScreen { display: none; position: relative; }

        /* Neon UI */
        h1 { color: #bf00ff; text-shadow: 0 0 10px #bf00ff; margin-bottom: 20px; }
        #chatDisplay { height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #333; margin: 10px 0; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 5px; max-width: 70%; font-size: 14px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .my-msg { align-self: flex-end; background: #bf00ff; color: white; }
        .other-msg { align-self: flex-start; background: #333; color: white; }
        
        input { padding: 12px; width: 85%; margin: 5px 0; border-radius: 10px; border: none; background: #262626; color: white; }
        button { padding: 10px; width: 90%; cursor: pointer; background: #bf00ff; border: none; border-radius: 10px; color: white; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px #bf00ff; }

        /* Icons & Actions */
        .back-btn { position: absolute; top: -10px; left: -10px; cursor: pointer; font-size: 20px; color: #bf00ff; }
        .clear-btn { background: transparent; color: #ff4d4d; font-size: 12px; border: 1px solid #ff4d4d; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginScreen">
            <h1>SECRET BASE</h1>
            <input type="text" id="userName" placeholder="Tumhara Naam...">
            <input type="text" id="roomId" placeholder="Room ID...">
            <input type="password" id="passCode" placeholder="Password...">
            <button onclick="enterRoom()">Enter Base</button>
        </div>

        <div id="chatScreen">
            <div class="back-btn" onclick="location.reload()">&#8592;</div>
            <h3 id="roomTitle"></h3>
            <div id="chatDisplay"></div>
            <input type="text" id="msgInput" placeholder="Type here...">
            <button onclick="sendMessage()">Send</button>
            <br>
            <button class="clear-btn" onclick="clearAll()">Clear Chat</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC07GrcfoghyftcZLyt3SUXh4K3DtoiFMo",
            authDomain: "privatechat-4ac4a.firebaseapp.com",
            projectId: "privatechat-4ac4a",
            storageBucket: "privatechat-4ac4a.firebasestorage.app",
            messagingSenderId: "376406143172",
            appId: "1:376406143172:web:e1a027828f59bb619b9991"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let myName = "", fullRoomName = "";

        function enterRoom() {
            myName = document.getElementById("userName").value;
            let roomId = document.getElementById("roomId").value;
            let pass = document.getElementById("passCode").value;
            
            if(myName && roomId && pass) {
                fullRoomName = roomId + "_" + pass;
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("chatScreen").style.display = "block";
                document.getElementById("roomTitle").innerText = "Room: " + roomId;
                loadMessages();
            }
        }

        function sendMessage() {
            let msg = document.getElementById("msgInput").value;
            if(msg.trim()) {
                db.collection("secret_rooms").doc(fullRoomName).collection("messages").add({
                    name: myName, text: msg, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById("msgInput").value = "";
            }
        }

        function clearAll() {
            if(confirm("Saari chat delete karein?")) {
                db.collection("secret_rooms").doc(fullRoomName).collection("messages").get().then((snapshot) => {
                    snapshot.forEach((doc) => doc.ref.delete());
                });
            }
        }

        function loadMessages() {
            db.collection("secret_rooms").doc(fullRoomName).collection("messages").orderBy("timestamp").onSnapshot((snapshot) => {
                let display = document.getElementById("chatDisplay");
                display.innerHTML = "";
                snapshot.forEach((doc) => {
                    let data = doc.data();
                    display.innerHTML += `<div class="msg ${data.name === myName ? 'my-msg' : 'other-msg'}"><b>${data.name}:</b> ${data.text}</div>`;
                });
                display.scrollTop = display.scrollHeight;
            });
        }
    </script>
</body>
</html>
